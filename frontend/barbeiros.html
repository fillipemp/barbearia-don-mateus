<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbearia Don Mateus | Barbeiros</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%23c8a951%22>✂</text></svg>">
</head>
<body>

  <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>✂ Don Mateus</h1>
      <p>Barbearia Don Mateus</p>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html"        class="nav-item"><span class="icon">◼</span> Dashboard</a>
      <a href="agendamentos.html" class="nav-item"><span class="icon">📅</span> Agendamentos</a>
      <a href="barbeiros.html"    class="nav-item active"><span class="icon">👤</span> Barbeiros</a>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <h2>Barbeiros</h2>
      <p>Gerencie a equipe da barbearia</p>
    </div>

    <div class="table-card">
      <div class="table-card-header">
        <h3>Lista de Barbeiros</h3>
        <button class="btn btn-primary" onclick="abrirModalNovo()">+ Novo Barbeiro</button>
      </div>

      <!-- Tabela desktop -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Contato</th>
              <th>Especialidade</th>
              <th>Horário</th>
              <th>Salário</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-barbeiros">
            <tr><td colspan="7"><div class="empty-state"><p>Carregando...</p></div></td></tr>
          </tbody>
        </table>
      </div>

      <!-- Cards mobile -->
      <div class="card-lista" id="cards-barbeiros"></div>
    </div>
  </main>

  <!-- ── Modal: Inserir / Editar Barbeiro ── -->
  <div class="modal-overlay" id="modal-barbeiro">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Novo Barbeiro</h3>
        <button class="modal-close" onclick="fecharModal('modal-barbeiro')">✕</button>
      </div>
      <div class="modal-body">
        <!-- id guardado aqui invisível quando for editar -->
        <input type="hidden" id="campo-id" />
        <input type="hidden" id="campo-enderecoId" />

        <div class="form-row">
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="campo-nome" placeholder="Carlos Andrade" />
          </div>
          <div class="form-group">
            <label>CPF</label>
            <input type="text" id="campo-cpf" placeholder="000.000.000-00" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Telefone *</label>
            <input type="text" id="campo-telefone" placeholder="(11) 99999-9999" />
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="campo-email" placeholder="barbeiro@email.com" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Especialidade</label>
            <input type="text" id="campo-especialidade" placeholder="Degradê, Barba, Navalhado..." />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="campo-status">
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Data de Admissão</label>
            <input type="date" id="campo-dataAdmissao" />
          </div>
          <div class="form-group">
            <label>Salário (R$)</label>
            <input type="number" id="campo-salario" placeholder="2500.00" step="0.01" min="0" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Horário Início</label>
            <input type="time" id="campo-horarioInicio" />
          </div>
          <div class="form-group">
            <label>Horário Fim</label>
            <input type="time" id="campo-horarioFim" />
          </div>
        </div>

        <!--
          Seção de endereço — demonstra o RELACIONAMENTO 1:1 do trabalho.
          Cada barbeiro tem um único endereço cadastrado separadamente.
          O InserirBarbeiroCommand cria o Endereço primeiro, depois o Barbeiro.
        -->
        <div class="form-divider">Endereço — Relacionamento 1:1</div>

        <div class="form-row">
          <div class="form-group">
            <label>Logradouro</label>
            <input type="text" id="campo-logradouro" placeholder="Rua das Flores" />
          </div>
          <div class="form-group">
            <label>Número</label>
            <input type="text" id="campo-numero" placeholder="123" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Bairro</label>
            <input type="text" id="campo-bairro" placeholder="Centro" />
          </div>
          <div class="form-group">
            <label>CEP</label>
            <input type="text" id="campo-cep" placeholder="00000-000" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="campo-cidade" placeholder="São Paulo" />
          </div>
          <div class="form-group">
            <label>Estado</label>
            <input type="text" id="campo-estado" placeholder="SP" maxlength="2"
                   style="text-transform:uppercase" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="fecharModal('modal-barbeiro')">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarBarbeiro()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let barbeiros = [];

    // Busca todos os barbeiros e atualiza a tela
    async function carregar() {
      try {
        barbeiros = await api.listarBarbeiros();
        renderizarTabela();
        renderizarCards();
      } catch (e) {
        toast('Erro ao carregar barbeiros.', 'erro');
      }
    }

    // Tabela para desktop
    function renderizarTabela() {
      const tbody = document.getElementById('tabela-barbeiros');
      if (barbeiros.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
          <div class="icon">👤</div><p>Nenhum barbeiro cadastrado ainda.</p>
        </div></td></tr>`;
        return;
      }
      tbody.innerHTML = barbeiros.map(b => `
        <tr>
          <td>
            <strong>${b.nome || '—'}</strong><br>
            <span style="font-size:0.75rem;color:var(--cor-texto-suave)">${b.cpf || ''}</span>
          </td>
          <td>
            ${b.telefone || '—'}<br>
            <span style="font-size:0.75rem;color:var(--cor-texto-suave)">${b.email || ''}</span>
          </td>
          <td>${b.especialidade || '—'}</td>
          <td style="font-size:0.8rem">${b.horarioInicio || '—'} às ${b.horarioFim || '—'}</td>
          <td style="color:var(--cor-dourado);font-weight:600">${formatarMoeda(b.salario)}</td>
          <td>${badgeStatus(b.status)}</td>
          <td>
            <div style="display:flex;gap:4px">
              <button class="btn btn-ghost btn-sm"  onclick="abrirEditar('${b.id}')">✏</button>
              <button class="btn btn-danger btn-sm" onclick="deletar('${b.id}')">🗑</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Cards para mobile
    function renderizarCards() {
      const container = document.getElementById('cards-barbeiros');
      if (barbeiros.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div class="icon">👤</div><p>Nenhum barbeiro cadastrado ainda.</p>
        </div>`;
        return;
      }
      container.innerHTML = barbeiros.map(b => `
        <div class="card-item">
          <div class="card-item-header">
            <div>
              <div class="card-item-titulo">${b.nome || '—'}</div>
              <div class="card-item-sub">${b.especialidade || ''}</div>
            </div>
            ${badgeStatus(b.status)}
          </div>
          <div class="card-item-linha"><span>Telefone</span><span>${b.telefone || '—'}</span></div>
          <div class="card-item-linha"><span>Horário</span><span>${b.horarioInicio || '—'} às ${b.horarioFim || '—'}</span></div>
          <div class="card-item-linha">
            <span>Salário</span>
            <span class="card-item-valor">${formatarMoeda(b.salario)}</span>
          </div>
          <div class="card-item-acoes">
            <button class="btn btn-ghost btn-sm"  onclick="abrirEditar('${b.id}')">✏ Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deletar('${b.id}')">🗑 Excluir</button>
          </div>
        </div>
      `).join('');
    }

    // Abre o modal em branco para novo cadastro
    function abrirModalNovo() {
      document.getElementById('modal-titulo').textContent = 'Novo Barbeiro';
      const campos = ['id','enderecoId','nome','cpf','telefone','email','especialidade',
                      'dataAdmissao','salario','horarioInicio','horarioFim',
                      'logradouro','numero','bairro','cep','cidade','estado'];
      campos.forEach(c => {
        const el = document.getElementById(`campo-${c}`);
        if (el) el.value = '';
      });
      document.getElementById('campo-status').value = 'ativo';
      abrirModal('modal-barbeiro');
    }

    // Abre o modal preenchido com os dados do barbeiro selecionado
    function abrirEditar(id) {
      const b = barbeiros.find(x => x.id === id);
      if (!b) return;
      const end = b.endereco || {};

      document.getElementById('modal-titulo').textContent   = 'Editar Barbeiro';
      document.getElementById('campo-id').value             = b.id;
      document.getElementById('campo-enderecoId').value     = b.enderecoId || '';
      document.getElementById('campo-nome').value           = b.nome || '';
      document.getElementById('campo-cpf').value            = b.cpf || '';
      document.getElementById('campo-telefone').value       = b.telefone || '';
      document.getElementById('campo-email').value          = b.email || '';
      document.getElementById('campo-especialidade').value  = b.especialidade || '';
      document.getElementById('campo-status').value         = b.status || 'ativo';
      document.getElementById('campo-dataAdmissao').value   = b.dataAdmissao || '';
      document.getElementById('campo-salario').value        = b.salario || '';
      document.getElementById('campo-horarioInicio').value  = b.horarioInicio || '';
      document.getElementById('campo-horarioFim').value     = b.horarioFim || '';
      // Preenche endereço (relacionamento 1:1)
      document.getElementById('campo-logradouro').value     = end.logradouro || '';
      document.getElementById('campo-numero').value         = end.numero || '';
      document.getElementById('campo-bairro').value         = end.bairro || '';
      document.getElementById('campo-cep').value            = end.cep || '';
      document.getElementById('campo-cidade').value         = end.cidade || '';
      document.getElementById('campo-estado').value         = end.estado || '';
      abrirModal('modal-barbeiro');
    }

    // Coleta o formulário e envia ao backend (novo ou edição)
    async function salvarBarbeiro() {
      const id         = document.getElementById('campo-id').value;
      const enderecoId = document.getElementById('campo-enderecoId').value;

      const dados = {
        nome:          document.getElementById('campo-nome').value.trim(),
        cpf:           document.getElementById('campo-cpf').value,
        telefone:      document.getElementById('campo-telefone').value,
        email:         document.getElementById('campo-email').value.trim(),
        especialidade: document.getElementById('campo-especialidade').value.trim(),
        status:        document.getElementById('campo-status').value,
        dataAdmissao:  document.getElementById('campo-dataAdmissao').value,
        salario:       parseFloat(document.getElementById('campo-salario').value) || 0,
        horarioInicio: document.getElementById('campo-horarioInicio').value,
        horarioFim:    document.getElementById('campo-horarioFim').value,
        // enderecoId mantém o id existente ao editar (o backend atualiza os dados)
        enderecoId:    enderecoId || undefined,
        // Objeto endereco é enviado para o backend criar/atualizar o Endereço (rel. 1:1)
        endereco: {
          logradouro: document.getElementById('campo-logradouro').value.trim(),
          numero:     document.getElementById('campo-numero').value.trim(),
          bairro:     document.getElementById('campo-bairro').value.trim(),
          cep:        document.getElementById('campo-cep').value.trim(),
          cidade:     document.getElementById('campo-cidade').value.trim(),
          estado:     document.getElementById('campo-estado').value.trim().toUpperCase()
        }
      };

      if (!dados.nome || !dados.telefone) {
        toast('Nome e telefone são obrigatórios.', 'erro');
        return;
      }
      if (dados.email && !emailValido(dados.email)) {
        toast('E-mail inválido. Use o formato: nome@dominio.com', 'erro');
        return;
      }

      try {
        if (id) {
          await api.atualizarBarbeiro(id, dados);
          toast('Barbeiro atualizado com sucesso!');
        } else {
          await api.inserirBarbeiro(dados);
          toast('Barbeiro cadastrado com sucesso!');
        }
        fecharModal('modal-barbeiro');
        carregar();
      } catch (e) {
        toast('Erro ao salvar barbeiro.', 'erro');
      }
    }

    // Remove o barbeiro após confirmação
    async function deletar(id) {
      if (!confirm('Confirma a exclusão deste barbeiro?')) return;
      try {
        await api.deletarBarbeiro(id);
        toast('Barbeiro removido.');
        carregar();
      } catch (e) {
        toast('Erro ao deletar barbeiro.', 'erro');
      }
    }

    aplicarMascaras({ cpf: 'campo-cpf', telefone: 'campo-telefone' });
    carregar();
  </script>
</body>
</html>
